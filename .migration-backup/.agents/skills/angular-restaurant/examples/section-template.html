<!-- 
  Example section template for Naar & Noor project
  
  Key conventions:
  - py-6 for vertical spacing (24px)
  - max-w-5xl or max-w-7xl for container width
  - Dark theme with #0a0a0a background
  - Orange (#C65A1E) for accents
  - Forum font for headings, Open Sans for body
-->

<section id="section-name" class="py-6 px-6">
  <div class="max-w-5xl mx-auto">
    <!-- Section Header -->
    <div class="text-center mb-12">
      <span class="text-[#C65A1E] text-xs font-medium tracking-[0.2em] uppercase mb-2 block">
        Section Label
      </span>
      <h2 class="font-['Forum'] text-4xl md:text-5xl text-white tracking-tight leading-tight">
        Section Title
      </h2>
      <p class="text-sm text-neutral-400 mt-4 max-w-2xl mx-auto">
        Section description text goes here.
      </p>
    </div>

    <!-- Section Content -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Card Example -->
      <div class="bg-[#111] border border-white/5 rounded-xl p-6 hover:border-white/10 transition-colors">
        <div class="w-12 h-12 rounded-lg bg-[#C65A1E]/10 border border-[#C65A1E]/20 flex items-center justify-center mb-4">
          <iconify-icon icon="solar:star-linear" width="24" class="text-[#C65A1E]"></iconify-icon>
        </div>
        <h3 class="font-['Forum'] text-xl text-white mb-2">Card Title</h3>
        <p class="text-sm text-neutral-400 leading-relaxed">
          Card description text goes here.
        </p>
      </div>
    </div>

    <!-- CTA Button -->
    <div class="mt-12 text-center">
      <button class="px-8 py-3.5 text-sm font-medium text-white bg-[#C65A1E] rounded-xl hover:bg-[#a84915] hover:shadow-[0_0_25px_rgba(198,90,30,0.5)] transition-all duration-300">
        Call to Action
      </button>
    </div>
  </div>
</section>
